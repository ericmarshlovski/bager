    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;

        }

            background-color: #f5f5f5;
            color: #111;
        }
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        nav {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 2rem;
            padding: 1.8rem 2.5rem;
        }
        .icon-btn {
            background: #1a1a1a;
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: background 0.2s;
        }
        body.light .icon-btn {
            background: #e0e0e0;
            color: #111;
        }
        .icon-btn:hover {
            background: #2a2a2a;
        }
        body.light .icon-btn:hover {
            background: #ccc;
        }
        .icon-btn svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .nav-link {
            color: inherit;
            text-decoration: none;
            font-size: 15px;
            opacity: 0.75;
            transition: opacity 0.2s;
        }
        .nav-link:hover {
            opacity: 1;
            color: #a5b4fc;
        }
        .theme-btn {
            background: #1a1a1a;
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        body.light .theme-btn {
            background: #e0e0e0;
            color: #111;
        }
        .theme-btn:hover {
            background: #2a2a2a;
        }
        body.light .theme-btn:hover {
            background: #ccc;
        }
        .theme-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
        .content {
            position: relative;
            z-index: 1;
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
            padding: 4rem 2.5rem;
        }
        .count {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            line-height: 1;
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeUp 0.5s ease 0.1s forwards;
        }
        .count-label {
            font-size: 1rem;
            color: #6b7280;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 0.5s ease 0.2s forwards;
        }
        .projects-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            opacity: 0;
            animation: fadeUp 0.5s ease 0.35s forwards;
        }
        .project-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            text-decoration: none;
            color: #fff;
            transition: border-color 0.2s, transform 0.2s;
        }
        body.light .project-card {
            background: #ebebeb;
            border-color: #d0d0d0;
            color: #111;
        }
        .project-card:hover {
            border-color: #444;
            transform: translateY(-2px);
        }
        body.light .project-card:hover {
            border-color: #aaa;
        }
        .project-icon {
            width: 48px;
            height: 48px;
            background: #1a1a1a;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 22px;
        }
        body.light .project-icon {
            background: #d5d5d5;
        }
        .project-info {
            flex: 1;
            min-width: 0;
        }
        .project-name {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 3px;
        }
        .project-name svg {
            width: 13px;
            height: 13px;
            fill: #6b7280;
            flex-shrink: 0;
        }
        .project-desc {
            font-size: 13px;
            color: #6b7280;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <nav>
        <a href="index.html" class="icon-btn" aria-label="geri dön">
            <svg viewBox="0 0 24 24"><path d="M19 12H5M5 12l7 7M5 12l7-7"/></svg>
        </a>
        <a href="projects.html" class="nav-link">xxx</a>
        <div style="margin-left:auto"></div>
        <button class="theme-btn" id="theme-toggle" aria-label="tema değiştir">
            <svg id="theme-icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
            <svg id="theme-icon-sun" viewBox="0 0 24 24" style="display:none"><path d="M12 4.5a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 12 4.5zm0 12a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 12 16.5zm7.5-4.5a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5a.75.75 0 0 1 .75.75zM6.75 12a.75.75 0 0 1-.75.75H4.5a.75.75 0 0 1 0-1.5H6a.75.75 0 0 1 .75.75zm9.72-5.03a.75.75 0 0 1 0 1.06l-1.06 1.06a.75.75 0 1 1-1.06-1.06l1.06-1.06a.75.75 0 0 1 1.06 0zM8.56 15.44a.75.75 0 0 1 0 1.06l-1.06 1.06a.75.75 0 1 1-1.06-1.06l1.06-1.06a.75.75 0 0 1 1.06 0zm7.94 1.06a.75.75 0 1 1-1.06-1.06l1.06-1.06a.75.75 0 1 1 1.06 1.06l-1.06 1.06zM8.56 8.56A.75.75 0 1 1 7.5 7.5l1.06 1.06a.75.75 0 0 1-1.06 1.06L7.5 7.5zM12 8.25a3.75 3.75 0 1 0 0 7.5 3.75 3.75 0 0 0 0-7.5z"/></svg>
        </button>
    </nav>

    <div class="content">
        <h1 class="count">1</h1>
        <p class="count-label">1 proje</p>
        <div class="projects-grid">
            <a href="https://menkibedergi.org" target="_blank" rel="noopener" class="project-card">
                <div class="project-icon">📰</div>
                <div class="project-info">
                    <div class="project-name">
                        menkibedergi.org
                        <svg viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                    </div>
                    <div class="project-desc">Menkibe Dergi</div>
                </div>
            </a>
        </div>
    </div>

    <script>
        const themeBtn = document.getElementById('theme-toggle');
        const moonIcon = document.getElementById('theme-icon-moon');
        const sunIcon = document.getElementById('theme-icon-sun');

        function setTheme(light) {
            document.body.classList.toggle('light', light);
            moonIcon.style.display = light ? 'none' : 'block';
            sunIcon.style.display = light ? 'block' : 'none';
            localStorage.setItem('theme', light ? 'light' : 'dark');
        }

        themeBtn.addEventListener('click', () => setTheme(!document.body.classList.contains('light')));

        const saved = localStorage.getItem('theme');
        if (saved === 'light') setTheme(true);

        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2 + 1,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.3,
                    opacity: Math.random() * 0.5 + 0.2
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const isLight = document.body.classList.contains('light');
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = isLight ? `rgba(0,0,0,${p.opacity * 0.4})` : `rgba(255,255,255,${p.opacity})`;
                ctx.fill();
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
            }
            requestAnimationFrame(drawParticles);
        }

        resizeCanvas();
        createParticles();
        drawParticles();
        window.addEventListener('resize', () => {
            resizeCanvas();
            createParticles();
        });
    </script>
</body>
</html>
