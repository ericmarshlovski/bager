<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        #particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* NAV */
        nav {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 2rem;
            padding: 1.8rem 2.5rem;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 15px;
            opacity: 0.75;
            transition: opacity 0.2s, color 0.2s;
            display: flex;
            align-items: center;
        }
        nav a:hover { opacity: 1; color: #a5b4fc; }
        nav svg { width: 18px; height: 18px; fill: currentColor; }
        nav .ml-auto { margin-left: auto; }

        .settings-btn {
            background: #1a1a1a;
            border: none;
            color: #fff;
            width: 36px; height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .settings-btn:hover { background: #2a2a2a; }
        .settings-btn svg { width: 16px; height: 16px; }

        /* CONTENT */
        .content {
            position: relative;
            z-index: 1;
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
            padding: 4rem 2.5rem 4rem;
        }

        .count {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            line-height: 1;
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeUp 0.5s ease 0.1s forwards;
        }

        .count-label {
            font-size: 1rem;
            color: #6b7280;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 0.5s ease 0.2s forwards;
        }

        /* PROJECT CARD */
        .projects-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            opacity: 0;
            animation: fadeUp 0.5s ease 0.35s forwards;
        }

        .project-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            text-decoration: none;
            color: #fff;
            transition: border-color 0.2s, transform 0.2s;
        }
        .project-card:hover {
            border-color: #444;
            transform: translateY(-2px);
        }

        .project-icon {
            width: 48px; height: 48px;
            background: #1a1a1a;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 22px;
        }

        .project-info { flex: 1; min-width: 0; }

        .project-name {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 3px;
        }

        .project-name svg {
            width: 13px; height: 13px;
            fill: #6b7280;
            flex-shrink: 0;
        }

        .project-desc {
            font-size: 13px;
            color: #6b7280;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <nav>

        </a>
        <a href="projects.html">projects</a>
        
        <div class="ml-auto"></div>

            <svg viewBox="0 0 512 512"><path d="M487.4 315.7l-42.6-24.6c4.3-23.2 4.3-47 0-70.2l42.6-24.6c4.9-2.8 7.1-8.6 5.5-14-11.1-35.6-30-67.8-54.7-94.6-3.8-4.1-10-5.1-14.8-2.3L380.8 110c-17.9-15.4-38.5-27.3-60.8-35.1V25.8c0-5.6-3.9-10.5-9.4-11.7-36.7-8.2-74.3-7.8-109.2 0-5.5 1.2-9.4 6.1-9.4 11.7V75c-22.2 7.9-42.8 19.8-60.8 35.1L88.7 85.5c-4.9-2.8-11-1.9-14.8 2.3-24.7 26.7-43.6 58.9-54.7 94.6-1.7 5.4.6 11.2 5.5 14L67.3 221c-4.3 23.2-4.3 47 0 70.2l-42.6 24.6c-4.9 2.8-7.1 8.6-5.5 14 11.1 35.6 30 67.8 54.7 94.6 3.8 4.1 10 5.1 14.8 2.3l42.6-24.6c17.9 15.4 38.5 27.3 60.8 35.1v49.2c0 5.6 3.9 10.5 9.4 11.7 36.7 8.2 74.3 7.8 109.2 0 5.5-1.2 9.4-6.1 9.4-11.7v-49.2c22.2-7.9 42.8-19.8 60.8-35.1l42.6 24.6c4.9 2.8 11 1.9 14.8-2.3 24.7-26.7 43.6-58.9 54.7-94.6 1.5-5.5-.7-11.3-5.6-14.1zM256 336c-44.1 0-80-35.9-80-80s35.9-80 80-80 80 35.9 80 80-35.9 80-80 80z"/></svg>

                    </div>
                    <div class="project-desc">Menkibe Dergi</div>
                </div>
            </a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

        function createParticles() {
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2 + 1,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.3,
                    opacity: Math.random() * 0.5 + 0.2
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${p.opacity})`;
                ctx.fill();
                p.x += p.speedX; p.y += p.speedY;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
            }
            requestAnimationFrame(drawParticles);
        }

        resizeCanvas(); createParticles(); drawParticles();
        window.addEventListener('resize', () => { resizeCanvas(); createParticles(); });
    </script>
