  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --fg: #fff;
      --muted: #9ca3af;
      --dimmer: #6b7280;
      --card-bg: #111;
      --card-border: #222;
      --hover: #a5b4fc;
      --spotify-green: #1DB954;
    }

    html { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--fg); }
    body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

    nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem 3rem;
      max-width: 900px;
      width: 100%;
    }
    nav a {
      color: var(--fg);
      text-decoration: none;
      font-size: 15px;
      opacity: 0.8;
      transition: opacity 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    nav a:hover { opacity: 1; color: var(--hover); }
    nav svg { width: 16px; height: 16px; fill: currentColor; }

    .main {
      padding: 0 3rem;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 1.1rem;
    }

    .icons {
      display: flex;
      gap: 1.3rem;
      margin-bottom: 2rem;
      justify-content: center;
    }
    .icons a {
      color: var(--fg);
      opacity: 0.7;
      transition: opacity 0.2s, color 0.2s;
      cursor: pointer;
    }
    .icons a:hover { opacity: 1; color: var(--hover); }
    .icons svg { width: 20px; height: 20px; fill: currentColor; display: block; }

    .clock {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: var(--dimmer);
      margin-bottom: 1.5rem;
    }
    .clock svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }

    .spotify-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.9rem;
      max-width: 340px;
      width: 100%;
      margin: 0 auto;
      transition: border-color 0.2s;
    }
    .spotify-card:hover { border-color: #333; }

    .spotify-art {
      width: 42px;
      height: 42px;
      background: #1a1a1a;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .spotify-art img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
    .spotify-art svg { width: 22px; height: 22px; fill: var(--spotify-green); }

    .spotify-info { min-width: 0; text-align: left; }
    .spotify-track {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }
    .spotify-artist {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }
    .spotify-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--dimmer);
      margin-top: 3px;
    }
    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .badge-dot.live {
      background: var(--spotify-green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .fade-up {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .fade-up.visible { opacity: 1; transform: translateY(0); }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #fff;
        --fg: #000;
        --muted: #6b7280;
        --dimmer: #9ca3af;
        --card-bg: #f9f9f9;
        --card-border: #e5e7eb;
        --hover: #4f46e5;
      }
    }
  </style>

  <script>
    const blocks = document.querySelectorAll('.fade-up');
    blocks.forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), 100 + i * 150);
    });

    function updateClock() {
      const now = new Date();
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const d = now.getDate();
      const suffix = [,'st','nd','rd'][d % 100 >> 3 ^ 1 && d % 10] || 'th';
      let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('clock-display').textContent =
        `${months[now.getMonth()]} ${d}${suffix} ${now.getFullYear()} • ${pad(h)}:${pad(m)}:${pad(s)} ${ampm}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    const LASTFM_API_KEY = '24b984e9a14eb6140c10178159d1971f';
    const LASTFM_USERNAME = 'mulksuz21';

    async function getNowPlaying() {
      const trackEl = document.getElementById('spotify-track');
      const artistEl = document.getElementById('spotify-artist');
      const dotEl = document.getElementById('badge-dot');
      
      try {
        const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${LASTFM_USERNAME}&api_key=${LASTFM_API_KEY}&format=json&limit=1`;
        const response = await fetch(url);
        const data = await response.json();
        const recentTracks = data.recenttracks?.track;
        
        if (recentTracks && recentTracks.length > 0) {
          const currentTrack = recentTracks[0];
          const isNowPlaying = currentTrack['@attr']?.nowplaying === 'true';
          
          if (isNowPlaying) {
            trackEl.textContent = currentTrack.name;
            artistEl.textContent = currentTrack.artist['#text'];
            artistEl.style.display = 'block';
            dotEl.classList.add('live');
          } else {
            trackEl.textContent = 'Not listening to anything';
            artistEl.style.display = 'none';
            dotEl.classList.remove('live');
          }
        } else {
          trackEl.textContent = 'Not listening to anything';
          artistEl.style.display = 'none';
          dotEl.classList.remove('live');
        }
      } catch (error) {
        trackEl.textContent = 'Not listening to anything';
        artistEl.style.display = 'none';
        dotEl.classList.remove('live');
      }
    }
    
    getNowPlaying();
    setInterval(getNowPlaying, 15000);
  </script>
