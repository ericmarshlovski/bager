        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        body.light {
            background-color: #f5f5f5;
            color: #111111;
        }

        #particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1.5rem;
            border: 3px solid #ffffff;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #1a1a1a;
        }
        body.light .avatar {
            border-color: #111;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }
        .avatar:hover {
            border-color: #a5b4fc;
            box-shadow: 0 0 15px rgba(165,180,252,0.6);
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }
        @media (min-width: 768px) { h1 { font-size: 5rem; } }

        .subtitle {
            font-size: 1rem;
            color: #9ca3af;
            margin-bottom: 1.5rem;
        }
        body.light .subtitle { color: #6b7280; }

        .icons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .icons a {
            color: #ffffff;
            opacity: 0.7;
            transition: opacity 0.2s, color 0.2s;
        }
        body.light .icons a { color: #111111; }
        .icons a:hover { opacity: 1; color: #a5b4fc; }
        .icons svg { width: 20px; height: 20px; fill: currentColor; }

        .clock {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: #6b7280;
            margin-bottom: 2rem;
        }
        .clock svg { width: 14px; height: 14px; fill: currentColor; }

        .spotify-card {
            background: #0d0d0d;
            border: 0.5px solid #1f1f1f;
            border-radius: 18px;
            padding: 1.25rem;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            transition: border-color 0.2s;
        }
        body.light .spotify-card {
            background: #ebebeb;
            border-color: #d0d0d0;
        }
        .spotify-card:hover { border-color: #333; }
        body.light .spotify-card:hover { border-color: #aaa; }

        .spotify-art {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            background: #1a1a1a;
            border: 0.5px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        body.light .spotify-art { background: #d5d5d5; border-color: #bbb; }
        .spotify-art img { width: 100%; height: 100%; object-fit: cover; }
        .spotify-art svg { width: 30px; height: 30px; }

        .spotify-info { text-align: left; }

        .spotify-track {
            font-size: 15px;
            font-weight: 500;
            color: #e5e5e5;
            margin-bottom: 3px;
        }
        body.light .spotify-track { color: #111; }

        .spotify-artist {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 2px;
        }

        .spotify-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #555;
            letter-spacing: 0.02em;
        }
        body.light .spotify-badge { color: #888; }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #333;
            display: inline-block;
        }
        body.light .badge-dot { background: #bbb; }
        .badge-dot.live {
            background: #1db954;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .theme-btn {
            background: #1a1a1a;
            border: none;
            color: #fff;
            width: 36px; height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        body.light .theme-btn { background: #e0e0e0; color: #111; }
        .theme-btn:hover { background: #2a2a2a; }
        body.light .theme-btn:hover { background: #ccc; }
        .theme-btn svg { width: 16px; height: 16px; fill: currentColor; }
    </style>

    <script>
        const themeBtn = document.getElementById('theme-toggle');
        const moonIcon = document.getElementById('theme-icon-moon');
        const sunIcon = document.getElementById('theme-icon-sun');

        function setTheme(light) {
            document.body.classList.toggle('light', light);
            moonIcon.style.display = light ? 'none' : 'block';
            sunIcon.style.display = light ? 'block' : 'none';
            localStorage.setItem('theme', light ? 'light' : 'dark');
        }

        themeBtn.addEventListener('click', () => {
            setTheme(!document.body.classList.contains('light'));
        });

        const saved = localStorage.getItem('theme');
        if (saved === 'light') setTheme(true);

        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let width, height;
        let points = [];
        let mouseX = null, mouseY = null;

        function initPoints() {
            points = [];
            for (let i = 0; i < 70; i++) {
                points.push({
                    x: Math.random(),
                    y: Math.random(),
                    vx: (Math.random() - 0.5) * 0.002,
                    vy: (Math.random() - 0.5) * 0.002,
                    radius: Math.random() * 2 + 1.5,
                    colorHue: 260 + Math.random() * 40
                });
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function draw() {
            if (!width || !height) return;
            ctx.clearRect(0, 0, width, height);
            
            const isLight = document.body.classList.contains('light');
            const darkMode = !isLight;
            
            if (darkMode) {
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, width, height);
            } else {
                ctx.fillStyle = '#f0f0f0';
                ctx.fillRect(0, 0, width, height);
            }
            
            for (let p of points) {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = 1;
                if (p.x > 1) p.x = 0;
                if (p.y < 0) p.y = 1;
                if (p.y > 1) p.y = 0;
                
                const screenX = p.x * width;
                const screenY = p.y * height;
                
                ctx.beginPath();
                ctx.arc(screenX, screenY, p.radius, 0, Math.PI * 2);
                if (darkMode) {
                    ctx.fillStyle = `hsla(${p.colorHue}, 70%, 65%, 0.7)`;
                } else {
                    ctx.fillStyle = `hsla(${p.colorHue}, 60%, 40%, 0.3)`;
                }
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(screenX, screenY, p.radius * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = darkMode ? `hsla(${p.colorHue}, 80%, 75%, 0.9)` : `hsla(${p.colorHue}, 70%, 50%, 0.6)`;
                ctx.fill();
            }
            
            for (let i = 0; i < points.length; i++) {
                for (let j = i + 1; j < points.length; j++) {
                    const p1 = points[i];
                    const p2 = points[j];
                    const dx = (p1.x - p2.x) * width;
                    const dy = (p1.y - p2.y) * height;
                    const dist = Math.hypot(dx, dy);
                    if (dist < 130) {
                        const alpha = (1 - dist / 130) * 0.3;
                        ctx.beginPath();
                        ctx.moveTo(p1.x * width, p1.y * height);
                        ctx.lineTo(p2.x * width, p2.y * height);
                        if (darkMode) {
                            ctx.strokeStyle = `hsla(280, 70%, 60%, ${alpha})`;
                        } else {
                            ctx.strokeStyle = `hsla(280, 60%, 40%, ${alpha * 0.6})`;
                        }
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }
            
            if (mouseX !== null && mouseY !== null) {
                for (let p of points) {
                    const screenX = p.x * width;
                    const screenY = p.y * height;
                    const distToMouse = Math.hypot(screenX - mouseX, screenY - mouseY);
                    if (distToMouse < 100) {
                        const glow = (1 - distToMouse / 100) * 5;
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, p.radius + glow, 0, Math.PI * 2);
                        ctx.fillStyle = darkMode ? `hsla(${p.colorHue}, 80%, 70%, 0.4)` : `hsla(${p.colorHue}, 70%, 50%, 0.3)`;
                        ctx.fill();
                    }
                }
            }
            
            requestAnimationFrame(draw);
        }

        resize();
        initPoints();
        draw();
        window.addEventListener('resize', () => {
            resize();
            initPoints();
        });
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        window.addEventListener('mouseleave', () => {
            mouseX = null;
            mouseY = null;
        });

        function updateClock() {
            const now = new Date();
            const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            const day = days[now.getDay()];
            const month = months[now.getMonth()];
            const date = now.getDate();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2,'0');
            const seconds = String(now.getSeconds()).padStart(2,'0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            document.getElementById('clock-display').textContent = `${day}, ${month} ${date} • ${hours}:${minutes}:${seconds} ${ampm}`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        const LASTFM_API_KEY = '24b984e9a14eb6140c10178159d1971f';
        const LASTFM_USERNAME = 'mulksuz21';

        async function getNowPlaying() {
            const trackEl = document.getElementById('spotify-track');
            const artistEl = document.getElementById('spotify-artist');
            const dotEl = document.getElementById('badge-dot');
            const artContainer = document.getElementById('spotify-art');
            const spotifyIcon = `<svg viewBox="0 0 24 24" fill="#1db954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>`;

            try {
                const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${LASTFM_USERNAME}&api_key=${LASTFM_API_KEY}&format=json&limit=1`;
                const response = await fetch(url);
                const data = await response.json();
                const tracks = data.recenttracks?.track;

                if (tracks && tracks.length > 0) {
                    const track = tracks[0];
                    const isNowPlaying = track['@attr']?.nowplaying === 'true';

                    if (isNowPlaying) {
                        trackEl.textContent = track.name;
                        artistEl.textContent = track.artist['#text'];
                        artistEl.style.display = 'block';
                        dotEl.classList.add('live');
                        if (track.image && track.image[2] && track.image[2]['#text']) {
                            artContainer.innerHTML = `<img src="${track.image[2]['#text']}" alt="album art">`;
                        }
                    } else {
                        trackEl.textContent = 'wele şu an bir şey dinlemiyor..';
                        artistEl.style.display = 'none';
                        dotEl.classList.remove('live');
                        artContainer.innerHTML = spotifyIcon;
                    }
                } else {
                    trackEl.textContent = 'wele şu an bir şey dinlemiyor..';
                    artistEl.style.display = 'none';
                    dotEl.classList.remove('live');
                    artContainer.innerHTML = spotifyIcon;
                }
            } catch {
                trackEl.textContent = 'wele şu an bir şey dinlemiyor..';
                artistEl.style.display = 'none';
                dotEl.classList.remove('live');
                artContainer.innerHTML = spotifyIcon;
            }
        }

        getNowPlaying();
        setInterval(getNowPlaying, 15000);
    </script>
</body>
