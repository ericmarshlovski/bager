<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ba û bager</title>
    <meta name="description" content="komünar">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
        }
        body.light { background-color: #f5f5f5; color: #111111; }
        .container { max-width: 600px; width: 100%; text-align: center; margin: auto; padding: 2rem; }
        .avatar { width: 96px; height: 96px; border-radius: 50%; margin-bottom: 1.5rem; border: 3px solid #fff; }
        body.light .avatar { border-color: #111; }
        h1 { font-size: 4rem; font-weight: 700; margin-bottom: 0.5rem; }
        .subtitle { font-size: 1rem; color: #9ca3af; margin-bottom: 1.5rem; }
        .icons { display: flex; gap: 1.5rem; justify-content: center; margin-bottom: 2rem; }
        .icons a { color: #fff; opacity: 0.7; transition: opacity 0.2s; text-decoration: none; }
        body.light .icons a { color: #111; }
        .icons a:hover { opacity: 1; }
        .clock { font-size: 0.875rem; color: #6b7280; margin-bottom: 2rem; }
        .spotify-card { background: #0d0d0d; border: 0.5px solid #1f1f1f; border-radius: 18px; padding: 1.25rem; display: inline-flex; align-items: center; gap: 1rem; }
        body.light .spotify-card { background: #ebebeb; border-color: #d0d0d0; }
        .spotify-art { width: 56px; height: 56px; border-radius: 12px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .spotify-info { text-align: left; }
        .spotify-track { font-size: 15px; font-weight: 500; color: #e5e5e5; }
        body.light .spotify-track { color: #111; }
        .spotify-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }
        .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #333; }
        .badge-dot.live { background: #1db954; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
        .theme-btn { background: #1a1a1a; border: none; color: #fff; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        body.light .theme-btn { background: #e0e0e0; color: #111; }
        nav { display: flex; justify-content: space-between; padding: 1.5rem 2rem; align-items: center; }
        .nav-link { color: inherit; text-decoration: none; opacity: 0.75; }
        .nav-link:hover { opacity: 1; }
    </style>
</head>
<body>
    <nav>
        <a href="projects.html" class="nav-link">projects</a>
        <button class="theme-btn" id="theme-toggle" aria-label="tema">
            <svg id="moon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
            <svg id="sun" viewBox="0 0 24 24" width="16" height="16" fill="currentColor" style="display:none"><path d="M12 4.5a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 12 4.5zm0 12a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 12 16.5zM19.5 12a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5a.75.75 0 0 1 .75.75zM6.75 12a.75.75 0 0 1-.75.75H4.5a.75.75 0 0 1 0-1.5H6a.75.75 0 0 1 .75.75z"/></svg>
        </button>
    </nav>
    <div class="container">
        <img src="cat.png" alt="bager" class="avatar">
        <h1>ba û bager</h1>
        <p class="subtitle">komünarların kanı yerde..</p>
        <div class="icons">
            <a href="https://github.com/ericmarshlovski" target="_blank">GitHub</a>
            <a href="https://x.com/menkibe0" target="_blank">Twitter</a>
            <a href="https://open.spotify.com/user/8djlkujkspdbpuejrs2llf6aj" target="_blank">Spotify</a>
            <a href="https://soundcloud.com/bager-926144271" target="_blank">SoundCloud</a>
            <a href="mailto:nujiyan1871@proton.me">Email</a>
        </div>
        <div class="clock" id="clock-display"></div>
        <div class="spotify-card">
            <div class="spotify-art" id="spotify-art">
                <svg viewBox="0 0 24 24" width="30" height="30" fill="#1db954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0z"/></svg>
            </div>
            <div class="spotify-info">
                <div class="spotify-track" id="spotify-track">wele şu an bir şey dinlemiyor..</div>
                <div class="spotify-badge"><span class="badge-dot" id="badge-dot"></span> Spotify</div>
            </div>
        </div>
    </div>
    <script>
        const themeBtn = document.getElementById('theme-toggle');
        const moon = document.getElementById('moon');
        const sun = document.getElementById('sun');
        function setTheme(light) {
            document.body.classList.toggle('light', light);
            moon.style.display = light ? 'none' : 'block';
            sun.style.display = light ? 'block' : 'none';
            localStorage.setItem('theme', light ? 'light' : 'dark');
        }
        themeBtn.addEventListener('click', () => setTheme(!document.body.classList.contains('light')));
        if (localStorage.getItem('theme') === 'light') setTheme(true);

        function updateClock() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('clock-display').innerText = now.toLocaleDateString('en-US', options);
        }
        updateClock(); setInterval(updateClock, 1000);

        const LASTFM_API_KEY = '24b984e9a14eb6140c10178159d1971f';
        const LASTFM_USERNAME = 'mulksuz21';
        async function getNowPlaying() {
            try {
                const res = await fetch(`https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${LASTFM_USERNAME}&api_key=${LASTFM_API_KEY}&format=json&limit=1`);
                const data = await res.json();
                const track = data.recenttracks?.track?.[0];
                if (track && track['@attr']?.nowplaying === 'true') {
                    document.getElementById('spotify-track').innerText = track.name;
                    document.getElementById('badge-dot').classList.add('live');
                    if (track.image?.[2]?.['#text']) document.getElementById('spotify-art').innerHTML = `<img src="${track.image[2]['#text']}" width="56" height="56" style="object-fit:cover">`;
                } else {
                    document.getElementById('spotify-track').innerText = 'wele şu an bir şey dinlemiyor..';
                    document.getElementById('badge-dot').classList.remove('live');
                    document.getElementById('spotify-art').innerHTML = `<svg viewBox="0 0 24 24" width="30" height="30" fill="#1db954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0z"/></svg>`;
                }
            } catch(e) { console.log(e); }
        }
        getNowPlaying(); setInterval(getNowPlaying, 15000);
    </script>
</body>
</html>
