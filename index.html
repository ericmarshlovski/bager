    <script>
        function updateClock() {
            const now = new Date();
            const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            let h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0'), s = String(now.getSeconds()).padStart(2,'0');
            const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
            document.getElementById('clock-display').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()} · ${h}:${m}:${s} ${ap}`;
        }
        updateClock(); setInterval(updateClock, 1000);

        const LASTFM_API_KEY = '24b984e9a14eb6140c10178159d1971f';
        const LASTFM_USERNAME = 'mulksuz21';
        const spotifyIcon = `<svg viewBox="0 0 24 24" fill="#1db954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>`;

        async function getNowPlaying() {
            const trackEl = document.getElementById('spotify-track');
            const artistEl = document.getElementById('spotify-artist');
            const dotEl = document.getElementById('badge-dot');
            const artEl = document.getElementById('spotify-art');
            try {
                const res = await fetch(`https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${LASTFM_USERNAME}&api_key=${LASTFM_API_KEY}&format=json&limit=1`);
                const data = await res.json();
                const track = data.recenttracks?.track?.[0];
                if (track && track['@attr']?.nowplaying === 'true') {
                    trackEl.textContent = track.name;
                    artistEl.textContent = track.artist['#text'];
                    artistEl.style.display = 'block';
                    dotEl.classList.add('live');
                    if (track.image?.[2]?.['#text']) artEl.innerHTML = `<img src="${track.image[2]['#text']}" alt="album art">`;
                } else {
                    trackEl.textContent = 'wele şu an bir şey dinlemiyor..';
                    artistEl.style.display = 'none';
                    dotEl.classList.remove('live');
                    artEl.innerHTML = spotifyIcon;
                }
            } catch {
                trackEl.textContent = 'wele şu an bir şey dinlemiyor..';
                artistEl.style.display = 'none';
                dotEl.classList.remove('live');
                artEl.innerHTML = spotifyIcon;
            }
        }
        getNowPlaying(); setInterval(getNowPlaying, 15000);
    </script>
