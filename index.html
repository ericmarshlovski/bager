<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="komünar">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --bg-2: #020301;
            --fg: #e2e4d4;
            --muted: #6f755e;
            --soft: rgba(226, 228, 212, 0.58);
            --line: rgba(117, 128, 78, 0.2);
            --line-strong: rgba(151, 161, 97, 0.42);
            --panel: rgba(3, 4, 2, 0.9);
            --panel-strong: rgba(4, 6, 3, 0.98);
            --olive: #a2aa6a;
            --olive-deep: #303b20;
            --bone: #d5d8c2;
            --shadow: rgba(91, 103, 55, 0.14);
            color-scheme: dark;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { min-height: 100%; }

        body {
            min-height: 100vh;
            color: var(--fg);
            font-family: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            background:
                linear-gradient(135deg, rgba(0,0,0,0) 0 49.45%, rgba(115,128,71,0.22) 49.5% 50.5%, rgba(0,0,0,0) 50.55%),
                linear-gradient(135deg, rgba(0,0,0,0.92) 0 50%, rgba(23,34,16,0.52) 50.08% 100%),
                radial-gradient(circle at 52% 45%, rgba(90, 99, 57, 0.14), transparent 31rem),
                linear-gradient(145deg, var(--bg), var(--bg-2) 58%, #000000);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
            transition: background 0.35s ease, color 0.35s ease;
        }

        body.light {
            --bg: #ecefe4;
            --bg-2: #dfe5d7;
            --fg: #172016;
            --muted: #58624d;
            --soft: rgba(23, 32, 22, 0.74);
            --line: rgba(69, 91, 45, 0.16);
            --line-strong: rgba(68, 93, 39, 0.42);
            --panel: rgba(239, 242, 232, 0.86);
            --panel-strong: rgba(243, 245, 238, 0.94);
            --olive: #3d611f;
            --olive-deep: #cbd4bd;
            --bone: #172016;
            --shadow: rgba(54, 72, 37, 0.15);
            color-scheme: light;
            background:
                linear-gradient(135deg, rgba(255,255,255,0) 0 49.25%, rgba(61,97,31,0.13) 49.35% 50.65%, rgba(255,255,255,0) 50.75%),
                linear-gradient(135deg, rgba(247,248,243,0.78) 0 50%, rgba(202,214,190,0.36) 50.08% 100%),
                radial-gradient(circle at 50% 42%, rgba(61, 97, 31, 0.08), transparent 29rem),
                linear-gradient(145deg, var(--bg), var(--bg-2) 54%, #f7f8f1);
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            background-image:
                linear-gradient(var(--line) 1px, transparent 1px),
                linear-gradient(90deg, var(--line) 1px, transparent 1px);
            background-size: 64px 64px;
            mask-image: radial-gradient(circle at center, black 0 48%, transparent 78%);
            opacity: 0.13;
        }

        body::after {
            background:
                radial-gradient(circle at center, transparent 0 46%, rgba(0,0,0,0.62) 100%),
                linear-gradient(180deg, rgba(255,255,255,0.01), transparent 8%, transparent 91%, rgba(0,0,0,0.72)),
                repeating-linear-gradient(0deg, rgba(151,161,97,0.014) 0 1px, transparent 1px 6px);
            mix-blend-mode: overlay;
            opacity: 0.32;
        }

        body.light::before { opacity: 0.16; }
        body.light::after {
            mix-blend-mode: multiply;
            opacity: 0.12;
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .site-nav {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: clamp(1rem, 3vw, 1.8rem) clamp(1rem, 4vw, 2.5rem);
        }

        .nav-link,
        .theme-btn {
            color: var(--fg);
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.012) inset, 0 14px 36px rgba(0,0,0,0.48);
            backdrop-filter: blur(10px);
            transition: transform 0.2s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .nav-link {
            min-height: 38px;
            display: inline-flex;
            align-items: center;
            gap: 0.58rem;
            padding: 0 0.85rem;
            text-decoration: none;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-radius: 5px;
        }

        .nav-link svg {
            width: 17px;
            height: 17px;
            fill: currentColor;
        }

        .nav-link:hover,
        .theme-btn:hover,
        .nav-link:focus-visible,
        .theme-btn:focus-visible {
            color: var(--olive);
            border-color: var(--line-strong);
            box-shadow: 0 0 0 1px rgba(151,161,97,0.1) inset, 0 0 22px var(--shadow);
            transform: translateY(-1px);
            outline: none;
        }

        .nav-spacer { margin-left: auto; }

        .theme-btn {
            width: 38px;
            height: 38px;
            border-radius: 5px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .shell {
            flex: 1;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(1.5rem, 4vw, 2rem) clamp(1rem, 5vw, 2rem) clamp(2.5rem, 7vw, 4.2rem);
        }

        .container {
            max-width: 660px;
            width: 100%;
            text-align: center;
            position: relative;
            isolation: isolate;
        }

        .container::before {
            content: "";
            position: absolute;
            inset: -2.45rem -2.35rem;
            z-index: -1;
            background:
                linear-gradient(135deg, rgba(0,0,0,0.88) 0 49.2%, rgba(142,154,91,0.18) 49.3% 50.7%, rgba(18,31,12,0.38) 50.8% 100%),
                rgba(0, 0, 0, 0.64);
            border: 1px solid rgba(151, 161, 97, 0.14);
            clip-path: polygon(0 7%, 5% 0, 100% 0, 100% 92%, 93% 100%, 0 100%);
            filter: drop-shadow(0 24px 72px rgba(0,0,0,0.5));
        }

        .container::after {
            content: "";
            position: absolute;
            width: 42%;
            height: 1px;
            right: 3%;
            top: -1.15rem;
            transform: rotate(-8deg);
            z-index: -1;
            background: linear-gradient(90deg, transparent, rgba(151, 161, 97, 0.72), transparent);
            opacity: 0.58;
        }

        body.light .container::before {
            background:
                linear-gradient(135deg, rgba(250,251,246,0.92) 0 49.2%, rgba(68,93,39,0.11) 49.3% 50.7%, rgba(210,220,201,0.34) 50.8% 100%),
                rgba(244, 246, 239, 0.7);
            border-color: rgba(68, 93, 39, 0.16);
            filter: drop-shadow(0 22px 54px rgba(40,52,32,0.12));
        }

        body.light .container::after {
            background: linear-gradient(90deg, transparent, rgba(61, 97, 31, 0.42), transparent);
            opacity: 0.42;
        }

        body.light .nav-link,
        body.light .theme-btn,
        body.light .icons a {
            background: rgba(236, 240, 229, 0.88);
            border-color: rgba(68, 93, 39, 0.2);
            box-shadow: 0 12px 26px rgba(45, 58, 38, 0.22), 0 0 0 1px rgba(255,255,255,0.58) inset;
        }

        body.light .nav-link:hover,
        body.light .theme-btn:hover,
        body.light .nav-link:focus-visible,
        body.light .theme-btn:focus-visible,
        body.light .icons a:hover,
        body.light .icons a:focus-visible {
            color: #2e5017;
            border-color: rgba(61, 97, 31, 0.48);
            box-shadow: 0 14px 30px rgba(45, 58, 38, 0.26), 0 0 0 1px rgba(61,97,31,0.14) inset;
        }

        .hero-photo {
            width: min(100%, 420px);
            aspect-ratio: 16 / 9;
            margin: 0 auto 1.35rem;
            border: 1px solid rgba(151,161,97,0.2);
            border-radius: 5px;
            overflow: hidden;
            background: #010201;
            clip-path: polygon(0 10%, 6% 0, 100% 0, 100% 88%, 94% 100%, 0 100%);
            box-shadow: 0 18px 48px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.012) inset;
        }

        .hero-photo img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            object-position: center 43%;
            filter: saturate(0.72) contrast(1.05) brightness(0.74);
        }

        body.light .hero-photo {
            border-color: rgba(68, 93, 39, 0.18);
            box-shadow: 0 16px 38px rgba(45,58,38,0.13), 0 0 0 1px rgba(255,255,255,0.62) inset;
        }

        body.light .hero-photo img {
            filter: saturate(0.78) contrast(0.98) brightness(0.94);
        }

        h1 {
            font-family: "Archivo Black", "IBM Plex Mono", sans-serif;
            font-size: clamp(4.3rem, 13vw, 7.45rem);
            line-height: 0.86;
            font-weight: 400;
            letter-spacing: 0;
            margin-bottom: 1rem;
            color: #77815a;
            background: none;
            -webkit-background-clip: initial;
            background-clip: border-box;
            text-shadow:
                0 2px 0 #020301,
                0 16px 38px rgba(0,0,0,0.82);
        }

        body.light h1 {
            color: #294817;
            background: none;
            -webkit-background-clip: initial;
            background-clip: border-box;
            text-shadow: 0 14px 28px rgba(45,58,38,0.11);
        }

        .subtitle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            font-size: clamp(0.86rem, 2.5vw, 1rem);
            color: var(--soft);
            margin-bottom: 1.55rem;
        }

        .subtitle::before,
        .subtitle::after {
            content: "";
            width: clamp(1.4rem, 8vw, 3.2rem);
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(151,161,97,0.58), var(--line-strong));
        }

        .subtitle::after {
            background: linear-gradient(90deg, var(--line-strong), transparent);
        }

        .icons {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-bottom: 1.65rem;
            flex-wrap: wrap;
        }

        .icons a {
            width: 42px;
            height: 42px;
            color: var(--fg);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 5px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 14px 30px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            transition: transform 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .icons a:hover,
        .icons a:focus-visible {
            color: var(--olive);
            border-color: var(--line-strong);
            box-shadow: 0 0 0 1px rgba(151,161,97,0.1) inset, 0 0 22px var(--shadow);
            transform: translateY(-2px);
            outline: none;
        }

        .icons svg {
            width: 19px;
            height: 19px;
            fill: currentColor;
        }

        .status-row {
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .clock {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.55rem;
            font-size: 0.78rem;
            color: var(--muted);
            margin: 0;
            padding: 0.56rem 0.8rem;
            border: 1px solid rgba(151, 161, 97, 0.14);
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.3);
        }

        body.light .clock {
            background: rgba(232, 237, 224, 0.86);
            border-color: rgba(68, 93, 39, 0.18);
            box-shadow: 0 12px 26px rgba(45,58,38,0.12);
        }

        .clock svg {
            width: 14px;
            height: 14px;
            fill: var(--olive);
        }

        .spotify-card {
            background: var(--panel-strong);
            border: 1px solid var(--line);
            border-radius: 5px;
            padding: 0.82rem;
            display: inline-flex;
            align-items: center;
            gap: 0.95rem;
            max-width: min(100%, 320px);
            box-shadow: 0 20px 58px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.012) inset;
            backdrop-filter: blur(10px);
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        .spotify-card:hover {
            border-color: var(--line-strong);
            box-shadow: 0 22px 62px rgba(0,0,0,0.58), 0 0 22px var(--shadow);
            transform: translateY(-1px);
        }

        .spotify-art {
            width: 58px;
            height: 58px;
            border-radius: 5px;
            background: rgba(4, 6, 3, 0.94);
            border: 1px solid rgba(151,161,97,0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        body.light .spotify-card {
            background: rgba(238, 241, 232, 0.95);
            border-color: rgba(68, 93, 39, 0.22);
            box-shadow: 0 18px 44px rgba(45,58,38,0.22), 0 0 0 1px rgba(255,255,255,0.64) inset;
        }

        body.light .spotify-art {
            background: rgba(223, 231, 214, 0.96);
            border-color: rgba(68, 93, 39, 0.24);
        }

        .spotify-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .spotify-art svg {
            width: 30px;
            height: 30px;
        }

        .spotify-info {
            text-align: left;
            min-width: 0;
        }

        .spotify-track {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--fg);
            margin-bottom: 0.2rem;
            overflow-wrap: anywhere;
        }

        .spotify-artist {
            font-size: 0.75rem;
            color: var(--soft);
            margin-top: 0.12rem;
        }

        .spotify-badge {
            display: flex;
            align-items: center;
            gap: 0.42rem;
            font-size: 0.68rem;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-top: 0.3rem;
        }

        .badge-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--muted);
            display: inline-block;
        }

        .badge-dot.live {
            background: var(--olive);
            box-shadow: 0 0 12px rgba(151,161,97,0.34);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.42; transform: scale(0.82); }
        }

        @media (max-width: 520px) {
            .site-nav {
                gap: 0.55rem;
                padding: 0.85rem 0.85rem 0.4rem;
            }

            .nav-link {
                min-height: 34px;
                padding: 0 0.62rem;
                font-size: 0.68rem;
                letter-spacing: 0.06em;
            }

            .nav-link:first-child {
                width: 38px;
                padding: 0;
                justify-content: center;
            }

            .theme-btn {
                width: 36px;
                height: 36px;
            }

            .shell {
                align-items: flex-start;
                padding: 4.2rem 1rem 2rem;
            }

            .container {
                max-width: 100%;
                padding: 0 0.1rem;
            }

            .container::before {
                inset: -1.35rem -0.55rem;
                clip-path: polygon(0 5%, 7% 0, 100% 0, 100% 94%, 91% 100%, 0 100%);
            }

            .container::after {
                width: 58%;
                right: 0;
                top: -0.72rem;
            }

            .hero-photo {
                width: min(100%, 19rem);
                margin-bottom: 1rem;
            }

            h1 {
                font-size: clamp(3.15rem, 18vw, 4.65rem);
                line-height: 0.9;
                margin-bottom: 0.8rem;
            }

            .subtitle {
                width: 100%;
                gap: 0.45rem;
                font-size: 0.78rem;
                margin-bottom: 1.15rem;
                white-space: nowrap;
            }

            .subtitle::before,
            .subtitle::after {
                width: min(12vw, 2.1rem);
            }

            .icons {
                display: grid;
                grid-template-columns: repeat(5, 38px);
                gap: 0.55rem;
                justify-content: center;
                margin-bottom: 1.2rem;
            }

            .icons a {
                width: 38px;
                height: 38px;
            }

            .icons svg {
                width: 17px;
                height: 17px;
            }

            .status-row {
                display: grid;
                justify-items: center;
                gap: 0.75rem;
            }

            .clock {
                width: min(100%, 21rem);
                font-size: 0.68rem;
                padding: 0.54rem 0.58rem;
                justify-content: center;
            }

            .spotify-card {
                width: 100%;
                max-width: 21rem;
                align-items: center;
                padding: 0.78rem;
                gap: 0.72rem;
            }

            .spotify-art {
                width: 50px;
                height: 50px;
            }

            .spotify-track {
                font-size: 0.8rem;
                line-height: 1.25;
            }

            .spotify-artist {
                font-size: 0.68rem;
            }

            .spotify-badge {
                font-size: 0.62rem;
                letter-spacing: 0.1em;
            }
        }

        @media (max-width: 370px) {
            .icons {
                grid-template-columns: repeat(3, 38px);
            }

            .subtitle {
                font-size: 0.72rem;
            }

            .clock {
                font-size: 0.63rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>

    <script>
        const themeBtn = document.getElementById('theme-toggle');
        const moonIcon = document.getElementById('theme-icon-moon');
        const sunIcon = document.getElementById('theme-icon-sun');

        function setTheme(light) {
            document.body.classList.toggle('light', light);
            moonIcon.style.display = light ? 'none' : 'block';
            sunIcon.style.display = light ? 'block' : 'none';
            localStorage.setItem('theme', light ? 'light' : 'dark');
        }

        themeBtn.addEventListener('click', () => {
            setTheme(!document.body.classList.contains('light'));
        });

        const saved = localStorage.getItem('theme');
        if (saved === 'light') setTheme(true);

        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        let width, height, dpr;
        let points = [];
        let sweep = 0;
        let mouseX = null;
        let mouseY = null;

        function initPoints() {
            const count = Math.min(46, Math.max(24, Math.floor(window.innerWidth / 28)));
            points = [];
            for (let i = 0; i < count; i++) {
                points.push({
                    x: Math.random(),
                    y: Math.random(),
                    vx: (Math.random() - 0.5) * 0.00045,
                    vy: (Math.random() - 0.5) * 0.00045,
                    radius: Math.random() * 1.1 + 0.55,
                    phase: Math.random() * Math.PI * 2
                });
            }
        }

        function resize() {
            dpr = Math.min(window.devicePixelRatio || 1, 2);
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = Math.floor(width * dpr);
            canvas.height = Math.floor(height * dpr);
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function draw() {
            if (!width || !height) return;
            const isLight = document.body.classList.contains('light');
            const darkMode = !isLight;

            ctx.clearRect(0, 0, width, height);
            if (darkMode) {
                ctx.fillStyle = 'rgba(1, 2, 1, 0.5)';
                ctx.fillRect(0, 0, width, height);
            }

            const grid = darkMode ? 'rgba(116, 126, 72, 0.018)' : 'rgba(63, 126, 24, 0.045)';
            ctx.strokeStyle = grid;
            ctx.lineWidth = 1;
            const spacing = 96;
            for (let x = (sweep * 18) % spacing; x < width; x += spacing) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = (sweep * 10) % spacing; y < height; y += spacing) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }

            for (let p of points) {
                if (!prefersReducedMotion) {
                    p.x += p.vx;
                    p.y += p.vy;
                }
                if (p.x < 0) p.x = 1;
                if (p.x > 1) p.x = 0;
                if (p.y < 0) p.y = 1;
                if (p.y > 1) p.y = 0;
            }

            for (let i = 0; i < points.length; i++) {
                const p1 = points[i];
                const x1 = p1.x * width;
                const y1 = p1.y * height;

                for (let j = i + 1; j < points.length; j++) {
                    const p2 = points[j];
                    const x2 = p2.x * width;
                    const y2 = p2.y * height;
                    const dist = Math.hypot(x1 - x2, y1 - y2);
                    if (dist < 118) {
                        const alpha = (1 - dist / 118) * (darkMode ? 0.08 : 0.13);
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.strokeStyle = darkMode ? `rgba(118, 132, 76, ${alpha})` : `rgba(63, 126, 24, ${alpha})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }

            for (let p of points) {
                const x = p.x * width;
                const y = p.y * height;
                const flicker = prefersReducedMotion ? 1 : 0.72 + Math.sin(sweep * 2.2 + p.phase) * 0.28;

                ctx.beginPath();
                ctx.arc(x, y, p.radius + 1.8, 0, Math.PI * 2);
                ctx.fillStyle = darkMode ? `rgba(118, 132, 76, ${0.032 * flicker})` : `rgba(63, 126, 24, ${0.07 * flicker})`;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(x, y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = darkMode ? `rgba(136, 149, 85, ${0.22 * flicker})` : `rgba(63, 126, 24, ${0.46 * flicker})`;
                ctx.fill();

                if (mouseX !== null && mouseY !== null) {
                    const distToMouse = Math.hypot(x - mouseX, y - mouseY);
                    if (distToMouse < 130) {
                        const glow = (1 - distToMouse / 130);
                        ctx.beginPath();
                        ctx.arc(x, y, p.radius + glow * 7, 0, Math.PI * 2);
                        ctx.fillStyle = darkMode ? `rgba(136, 149, 85, ${0.05 * glow})` : `rgba(63, 126, 24, ${0.09 * glow})`;
                        ctx.fill();
                    }
                }
            }

            if (!prefersReducedMotion) {
                const scanY = (sweep * 90) % (height + 220) - 110;
                const gradient = ctx.createLinearGradient(0, scanY - 80, 0, scanY + 80);
                gradient.addColorStop(0, 'rgba(118, 132, 76, 0)');
                gradient.addColorStop(0.5, darkMode ? 'rgba(118, 132, 76, 0.024)' : 'rgba(63, 126, 24, 0.05)');
                gradient.addColorStop(1, 'rgba(118, 132, 76, 0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, scanY - 80, width, 160);
                sweep += 0.006;
                requestAnimationFrame(draw);
            }
        }

        resize();
        initPoints();
        draw();
        window.addEventListener('resize', () => {
            resize();
            initPoints();
        });

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        window.addEventListener('mouseleave', () => {
            mouseX = null;
            mouseY = null;
        });

        function updateClock() {
            const now = new Date();
            const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            const day = days[now.getDay()];
            const month = months[now.getMonth()];
            const date = now.getDate();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2,'0');
            const seconds = String(now.getSeconds()).padStart(2,'0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            document.getElementById('clock-display').textContent = `${day}, ${month} ${date} • ${hours}:${minutes}:${seconds} ${ampm}`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        const LASTFM_API_KEY = '24b984e9a14eb6140c10178159d1971f';
        const LASTFM_USERNAME = 'mulksuz21';

        async function getNowPlaying() {
            const trackEl = document.getElementById('spotify-track');
            const artistEl = document.getElementById('spotify-artist');
            const dotEl = document.getElementById('badge-dot');
            const artContainer = document.getElementById('spotify-art');
            const spotifyIcon = `<svg viewBox="0 0 24 24" fill="#77824d"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>`;

            try {
                const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${LASTFM_USERNAME}&api_key=${LASTFM_API_KEY}&format=json&limit=1`;
                const response = await fetch(url);
                const data = await response.json();
                const tracks = data.recenttracks?.track;

                if (tracks && tracks.length > 0) {
                    const track = tracks[0];
                    const isNowPlaying = track['@attr']?.nowplaying === 'true';

                    if (isNowPlaying) {
                        trackEl.textContent = track.name;
                        artistEl.textContent = track.artist['#text'];
                        artistEl.style.display = 'block';
                        dotEl.classList.add('live');
                        if (track.image && track.image[2] && track.image[2]['#text']) {
                            artContainer.innerHTML = `<img src="${track.image[2]['#text']}" alt="album art">`;
                        }
                    } else {
                        trackEl.textContent = 'wele şu an bir şey dinlemiyor..';
                        artistEl.style.display = 'none';
                        dotEl.classList.remove('live');
                        artContainer.innerHTML = spotifyIcon;
                    }
                } else {
                    trackEl.textContent = 'wele şu an bir şey dinlemiyor..';
                    artistEl.style.display = 'none';
                    dotEl.classList.remove('live');
                    artContainer.innerHTML = spotifyIcon;
                }
            } catch {
                trackEl.textContent = 'wele şu an bir şey dinlemiyor..';
                artistEl.style.display = 'none';
                dotEl.classList.remove('live');
                artContainer.innerHTML = spotifyIcon;
            }
        }

        getNowPlaying();
        setInterval(getNowPlaying, 15000);
    </script>
