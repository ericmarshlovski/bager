        .avatar {

            margin-bottom: 1.5rem;
            border: 2px solid #1f2937;
            transition: border-color 0.2s;
        }

        .avatar:hover {

        }

        h1 {
            font-size: 4rem;

        .icons {

            justify-content: center;

        .icons a {
            color: #ffffff;
            opacity: 0.7;

            justify-content: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: #6b7280;
            margin-bottom: 2rem;
        }

        .clock svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .spotify-card {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            transition: border-color 0.2s;
        }

        .spotify-card:hover {
            border-color: #333333;
        }

        .spotify-art {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .spotify-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .spotify-art svg {
            width: 28px;
            height: 28px;
            color: #1db954;
        }

        .spotify-info {
            text-align: left;
            min-width: 180px;
        }

        .spotify-track {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .spotify-artist {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 2px;
        }

        .spotify-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: #6b7280;
            margin-top: 4px;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #444444;
        }

        .badge-dot.live {
            background: #1db954;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let particleCount = 80;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2 + 1,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.3,
                    opacity: Math.random() * 0.5 + 0.2
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                ctx.fill();
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
            }
            requestAnimationFrame(drawParticles);
        }

        resizeCanvas();
        createParticles();
        drawParticles();
        window.addEventListener('resize', () => {
            resizeCanvas();
            createParticles();
        });

        function updateClock() {
            const now = new Date();
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const day = days[now.getDay()];
            const month = months[now.getMonth()];
            const date = now.getDate();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            document.getElementById('clock-display').textContent = `${day}, ${month} ${date} • ${hours}:${minutes}:${seconds} ${ampm}`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        const LASTFM_API_KEY = '24b984e9a14eb6140c10178159d1971f';
        const LASTFM_USERNAME = 'mulksuz21';

        async function getNowPlaying() {
            const trackEl = document.getElementById('spotify-track');
            const artistEl = document.getElementById('spotify-artist');
            const dotEl = document.getElementById('badge-dot');
            const artContainer = document.getElementById('spotify-art');
            
            try {
                const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${LASTFM_USERNAME}&api_key=${LASTFM_API_KEY}&format=json&limit=1`;
                const response = await fetch(url);
                const data = await response.json();
                const tracks = data.recenttracks?.track;
                
                if (tracks && tracks.length > 0) {
                    const track = tracks[0];
                    const isNowPlaying = track['@attr']?.nowplaying === 'true';
                    
                    if (isNowPlaying) {
                        trackEl.textContent = track.name;
                        artistEl.textContent = track.artist['#text'];
                        artistEl.style.display = 'block';
                        dotEl.classList.add('live');
                        
                        if (track.image && track.image[2] && track.image[2]['#text']) {
                            const imgUrl = track.image[2]['#text'];
                            artContainer.innerHTML = `<img src="${imgUrl}" alt="album art">`;
                        }
                    } else {
                        trackEl.textContent = 'Not listening to anything';
                        artistEl.style.display = 'none';
                        dotEl.classList.remove('live');
                        artContainer.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0z"/></svg>`;
                    }
                } else {
                    trackEl.textContent = 'Not listening to anything';
                    artistEl.style.display = 'none';
                    dotEl.classList.remove('live');
                    artContainer.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0z"/></svg>`;
                }
            } catch (error) {
                trackEl.textContent = 'Not listening to anything';
                artistEl.style.display = 'none';
                dotEl.classList.remove('live');
                artContainer.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0z"/></svg>`;
            }
        }
        
        getNowPlaying();
        setInterval(getNowPlaying, 15000);
    </script>
