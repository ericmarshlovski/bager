<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | ba û bager</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; img-src 'self'; base-uri 'self'; form-action 'none'; object-src 'none'">
    <meta name="theme-color" content="#0e0d0b">
    <link rel="icon" type="image/png" href="/bager/cat.png">
    <style>
        :root {
            --bg: #0e0d0b;
            --ink: #e8e2d0;
            --muted: #9a927c;
            --faint: #6b6455;
            --renk: #556B2F;
            color-scheme: dark;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--ink);
            font-family: "IBM Plex Mono", ui-monospace, monospace;
            font-size: 0.9375rem;
            line-height: 1.75;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        main { padding: 2rem 1.25rem; }
        .cmd { color: var(--faint); }
        .cmd::before { content: "~ $ "; }
        .err { color: var(--renk); margin-bottom: 2rem; }
        a { color: var(--muted); text-underline-offset: 4px; }
        a:hover { color: var(--renk); }
        :focus-visible { outline: 2px solid var(--renk); outline-offset: 3px; }
    </style>
</head>
<body>
    <main>
        <p class="cmd">cd sayfa</p>
        <p class="err">cd: sayfa: böyle bir dizin yok..</p>
        <p><a href="/bager/">cd ~/index</a></p>
    </main>
</body>
</html>
