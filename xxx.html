        .project-icon {

</head>
<body>
    <canvas id="particles"></canvas>

    <nav>
        <a href="index.html" class="icon-btn" aria-label="geri dön">

        <div style="margin-left:auto"></div>
        <button class="theme-btn" id="theme-toggle" aria-label="tema değiştir">
            <svg id="theme-icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
            <svg id="theme-icon-sun" viewBox="0 0 24 24" style="display:none"><path d="M12 4.5a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 12 4.5zm0 12a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 12 16.5zm7.5-4.5a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5a.75.75 0 0 1 .75.75zM6.75 12a.75.75 0 0 1-.75.75H4.5a.75.75 0 0 1 0-1.5H6a.75.75 0 0 1 .75.75zm9.72-5.03a.75.75 0 0 1 0 1.06l-1.06 1.06a.75.75 0 1 1-1.06-1.06l1.06-1.06a.75.75 0 0 1 1.06 0zM8.56 15.44a.75.75 0 0 1 0 1.06l-1.06 1.06a.75.75 0 1 1-1.06-1.06l1.06-1.06a.75.75 0 0 1 1.06 0zm7.94 1.06a.75.75 0 1 1-1.06-1.06l1.06-1.06a.75.75 0 1 1 1.06 1.06l-1.06 1.06zM8.56 8.56A.75.75 0 1 1 7.5 7.5l1.06 1.06a.75.75 0 0 1-1.06 1.06L7.5 7.5zM12 8.25a3.75 3.75 0 1 0 0 7.5 3.75 3.75 0 0 0 0-7.5z"/></svg>

    <div class="content">

        <div class="projects-grid">
            <a href="https://menkibedergi.org" target="_blank" rel="noopener" class="project-card">
                <div class="project-icon">📰</div>
                <div class="project-info">
                    <div class="project-name">
                        menkibedergi.org
                        <svg viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                    </div>
                    <div class="project-desc">Menkibe Dergi</div>

    <script>
        const themeBtn = document.getElementById('theme-toggle');
        const moonIcon = document.getElementById('theme-icon-moon');
        const sunIcon = document.getElementById('theme-icon-sun');

        function setTheme(light) {
            document.body.classList.toggle('light', light);
            moonIcon.style.display = light ? 'none' : 'block';
            sunIcon.style.display = light ? 'block' : 'none';
            localStorage.setItem('theme', light ? 'light' : 'dark');
        }

        themeBtn.addEventListener('click', () => setTheme(!document.body.classList.contains('light')));

        const saved = localStorage.getItem('theme');
        if (saved === 'light') setTheme(true);

        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let width, height;
        let points = [];
        let mouseX = null, mouseY = null;

        const isMobile = window.innerWidth <= 768;
        const POINT_COUNT = isMobile ? 40 : 70;
        const LINE_DISTANCE = isMobile ? 100 : 130;

        function initPoints() {
            points = [];
            for (let i = 0; i < POINT_COUNT; i++) {
                points.push({
                    x: Math.random(),
                    y: Math.random(),
                    vx: (Math.random() - 0.5) * 0.002,
                    vy: (Math.random() - 0.5) * 0.002,
                    radius: Math.random() * 2 + 1.5,
                    colorHue: 260 + Math.random() * 40
                });
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function draw() {
            if (!width || !height) return;
            ctx.clearRect(0, 0, width, height);
            
            const isLight = document.body.classList.contains('light');
            const darkMode = !isLight;
            
            if (darkMode) {
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, width, height);
            } else {
                ctx.fillStyle = '#f0f0f0';
                ctx.fillRect(0, 0, width, height);
            }
            
            for (let p of points) {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = 1;
                if (p.x > 1) p.x = 0;
                if (p.y < 0) p.y = 1;
                if (p.y > 1) p.y = 0;
                
                const screenX = p.x * width;
                const screenY = p.y * height;
                
                ctx.beginPath();
                ctx.arc(screenX, screenY, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = darkMode ? `hsla(${p.colorHue}, 70%, 65%, 0.7)` : `hsla(${p.colorHue}, 60%, 40%, 0.3)`;
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(screenX, screenY, p.radius * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = darkMode ? `hsla(${p.colorHue}, 80%, 75%, 0.9)` : `hsla(${p.colorHue}, 70%, 50%, 0.6)`;
                ctx.fill();
            }
            
            for (let i = 0; i < points.length; i++) {
                for (let j = i + 1; j < points.length; j++) {
                    const p1 = points[i];
                    const p2 = points[j];
                    const dx = (p1.x - p2.x) * width;
                    const dy = (p1.y - p2.y) * height;
                    const dist = Math.hypot(dx, dy);
                    if (dist < LINE_DISTANCE) {
                        const alpha = (1 - dist / LINE_DISTANCE) * 0.3;
                        ctx.beginPath();
                        ctx.moveTo(p1.x * width, p1.y * height);
                        ctx.lineTo(p2.x * width, p2.y * height);
                        ctx.strokeStyle = darkMode ? `hsla(280, 70%, 60%, ${alpha})` : `hsla(280, 60%, 40%, ${alpha * 0.6})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }
            
            if (mouseX !== null && mouseY !== null) {
                for (let p of points) {
                    const screenX = p.x * width;
                    const screenY = p.y * height;
                    const distToMouse = Math.hypot(screenX - mouseX, screenY - mouseY);
                    if (distToMouse < 100) {
                        const glow = (1 - distToMouse / 100) * 5;
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, p.radius + glow, 0, Math.PI * 2);
                        ctx.fillStyle = darkMode ? `hsla(${p.colorHue}, 80%, 70%, 0.4)` : `hsla(${p.colorHue}, 70%, 50%, 0.3)`;
                        ctx.fill();
                    }
                }
            }
            
            requestAnimationFrame(draw);
        }

        function handleMove(clientX, clientY) {
            mouseX = clientX;
            mouseY = clientY;
        }

        function handleLeave() {
            mouseX = null;
            mouseY = null;
        }

        resize();
        initPoints();
        draw();
        window.addEventListener('resize', () => {
            resize();
            initPoints();
        });
        
        window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseleave', handleLeave);
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length) handleMove(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length) handleMove(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener('touchend', handleLeave);
        window.addEventListener('touchcancel', handleLeave);
    </script>
</body>
